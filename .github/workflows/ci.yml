name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Smoke test gateway
        run: npm run smoke:gateway

      - name: Package VSIX
        run: npm run package:vsix
